<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f89ec;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#085899;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <text x="100" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="900" fill="white">Programming</text>
  <text x="100" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="900" fill="white">Is Easy</text>
  <text x="100" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="300" fill="rgba(255,255,255,0.8)">No jargon. No boring tutorials. Just colorful,</text>
  <text x="100" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="300" fill="rgba(255,255,255,0.8)">interactive lessons that make programming click.</text>
  <rect x="100" y="470" width="160" height="40" rx="8" fill="rgba(255,255,255,0.15)" />
