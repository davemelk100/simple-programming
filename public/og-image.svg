  <rect x="280" y="470" width="260" height="40" rx="8" fill="rgba(255,255,255,0.15)" />
  <text x="300" y="497" font-family="monospace" font-size="16" font-weight="600" fill="rgba(255,255,255,0.7)">2. SYNTAX &amp; PRINCIPLES</text>
  <rect x="560" y="470" width="250" height="40" rx="8" fill="rgba(255,255,255,0.15)" />
  <text x="580" y="497" font-family="monospace" font-size="16" font-weight="600" fill="rgba(255,255,255,0.7)">3. LANGUAGES &amp; TOOLS</text>
  <rect x="830" y="470" width="220" height="40" rx="8" fill="rgba(255,255,255,0.15)" />
  <text x="850" y="497" font-family="monospace" font-size="16" font-weight="600" fill="rgba(255,255,255,0.7)">4. BUILD &amp; DEPLOY</text>
